# 运维自愈系统 - 基础设施部署
# 使用方法: docker compose up -d

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: auto-healing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auto_healing
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本 - 启动时自动执行迁移
      - ../../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_healing"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto-healing-network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: auto-healing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto-healing-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  auto-healing-network:
    driver: bridge
