# 运维自愈系统 - 基础设施 + UI
# server 直接以二进制运行在宿主机，见 start.sh
#
# 启动:    ./start.sh
# 只重启:  ./start.sh ui

services:
  postgres:
    image: postgres:15-alpine
    container_name: auto-healing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auto_healing
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_healing"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto-healing-network

  redis:
    image: redis:7-alpine
    container_name: auto-healing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - /data/redis:/data:Z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto-healing-network

  ui:
    image: ghcr.io/heyangguang/auto-healing-ui:${UI_VERSION:-v1.0.0}
    container_name: auto-healing-ui
    restart: unless-stopped
    ports:
      - "8000:80"
    extra_hosts:
      - "pangolin-server:host-gateway"   # server 二进制跑在宿主机，通过 host-gateway 访问
    networks:
      - auto-healing-network

networks:
  auto-healing-network:
    driver: bridge
