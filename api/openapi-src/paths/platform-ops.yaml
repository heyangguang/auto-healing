/platform/tenant-roles:
  get:
    tags:
    - 平台角色管理
    summary: 获取系统租户角色模板
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Role'
/platform/settings:
  get:
    tags:
    - 平台租户管理
    summary: 获取平台设置
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/settings/{key}:
  put:
    tags:
    - 平台租户管理
    summary: 更新单个平台设置
    parameters:
    - name: key
      in: path
      required: true
      schema:
        type: string
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants:
  get:
    tags:
    - 平台租户管理
    summary: 获取租户列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  post:
    tags:
    - 平台租户管理
    summary: 创建租户
    responses:
      '201':
        $ref: '#/components/responses/Success'
/platform/tenants/stats:
  get:
    tags:
    - 平台租户管理
    summary: 获取租户统计
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/trends:
  get:
    tags:
    - 平台租户管理
    summary: 获取租户趋势
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}:
  get:
    tags:
    - 平台租户管理
    summary: 获取租户详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
  put:
    tags:
    - 平台租户管理
    summary: 更新租户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
  delete:
    tags:
    - 平台租户管理
    summary: 删除租户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}/members:
  get:
    tags:
    - 平台租户管理
    summary: 获取租户成员
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
  post:
    tags:
    - 平台租户管理
    summary: 添加租户成员
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}/members/{userId}:
  delete:
    tags:
    - 平台租户管理
    summary: 移除租户成员
    parameters:
    - $ref: '#/components/parameters/ID'
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}/members/{userId}/role:
  put:
    tags:
    - 平台租户管理
    summary: 更新租户成员角色
    parameters:
    - $ref: '#/components/parameters/ID'
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}/invitations:
  post:
    tags:
    - 平台租户管理
    summary: 邀请用户加入租户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
  get:
    tags:
    - 平台租户管理
    summary: 获取租户邀请列表
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/tenants/{id}/invitations/{invId}:
  delete:
    tags:
    - 平台租户管理
    summary: 取消租户邀请
    parameters:
    - $ref: '#/components/parameters/ID'
    - name: invId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        $ref: '#/components/responses/Success'
