/common/search:
  get:
    tags:
    - 公共能力
    summary: 全局搜索
    parameters:
    - name: q
      in: query
      required: true
      schema:
        type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  total:
                    type: integer
/common/user/preferences:
  get:
    tags:
    - 公共能力
    summary: 获取用户偏好
    responses:
      '200':
        $ref: '#/components/responses/Success'
  put:
    tags:
    - 公共能力
    summary: 全量更新用户偏好
    responses:
      '200':
        $ref: '#/components/responses/Success'
  patch:
    tags:
    - 公共能力
    summary: 局部更新用户偏好
    responses:
      '200':
        $ref: '#/components/responses/Success'
/common/user/favorites:
