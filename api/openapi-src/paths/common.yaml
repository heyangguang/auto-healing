    - 公共能力
    summary: 添加用户收藏菜单
    responses:
      '200':
        $ref: '#/components/responses/Success'
/common/user/favorites/{menu_key}:
  delete:
    tags:
    - 公共能力
    summary: 删除用户收藏菜单
    parameters:
    - name: menu_key
      in: path
      required: true
      schema:
        type: string
    responses:
      '200':
        $ref: '#/components/responses/Success'
/common/user/recents:
