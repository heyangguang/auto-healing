/tenant/blacklist-exemptions:
  get:
    tags:
    - 黑名单豁免
    summary: 获取黑名单豁免列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: blacklist_exemption_status
        x-dict-mode: exact
    - name: task_id
      in: query
      schema:
        type: string
    - name: rule_id
      in: query
      schema:
        type: string
    - name: search
      in: query
      schema:
        type: string
    - name: sort_by
      in: query
      schema:
        type: string
    - name: sort_order
      in: query
      schema:
        type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      additionalProperties: true
  post:
    tags:
    - 黑名单豁免
    summary: 创建黑名单豁免申请
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - task_id
            - rule_id
            - reason
            properties:
              task_id:
                type: string
                format: uuid
              task_name:
                type: string
              rule_id:
                type: string
                format: uuid
              rule_name:
                type: string
              rule_severity:
                type: string
                x-dict-type: command_blacklist_severity
                x-dict-mode: exact
              rule_pattern:
                type: string
              reason:
                type: string
              validity_days:
                type: integer
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    additionalProperties: true
