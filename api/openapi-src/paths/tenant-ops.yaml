/tenant/secrets/query:
  post:
    tags:
    - 密钥管理
    summary: 按主机查询密钥
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecretQuery'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Secret'
/tenant/audit-logs:
  get:
    tags:
    - 审计日志
    summary: 获取租户审计日志列表
    description: 默认返回当前租户内操作审计；当 category=auth 时返回当前租户成员的认证安全事件投影。category=login 为兼容别名，仅返回 auth 中的 login/logout。
    parameters:
    - name: category
      in: query
      schema:
        type: string
        enum:
        - operation
        - auth
        - login
    responses:
      '200':
        $ref: '#/components/responses/Success'
/tenant/audit-logs/stats:
  get:
    tags:
    - 审计日志
    summary: 获取审计统计概览
    parameters:
    - name: category
      in: query
      schema:
        type: string
        enum:
        - operation
        - auth
        - login
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
/tenant/audit-logs/user-ranking:
  get:
    tags:
    - 审计日志
    summary: 获取用户操作排行
    parameters:
