/tenant/command-blacklist:
  get:
    tags:
    - 高危指令黑名单
    summary: 获取黑名单规则列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: search
      in: query
      schema:
        type: string
    - name: severity
      in: query
      schema:
        type: string
        x-dict-type: command_blacklist_severity
        x-dict-mode: exact
    - name: is_active
      in: query
      schema:
        type: boolean
    - name: match_type
      in: query
      schema:
        type: string
        x-dict-type: command_blacklist_match_type
        x-dict-mode: exact
    - name: pattern
      in: query
      schema:
        type: string
    - name: operator
      in: query
      schema:
        type: string
    - name: scope
      in: query
      schema:
        type: string
    - name: sort_by
      in: query
      schema:
        type: string
    - name: sort_order
      in: query
      schema:
        type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommandBlacklist'
  post:
    tags:
    - 高危指令黑名单
    summary: 创建黑名单规则
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommandBlacklist'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandBlacklist'
/tenant/command-blacklist/batch-toggle:
  post:
    tags:
    - 高危指令黑名单
    summary: 批量启用或禁用规则
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - ids
            - is_active
            properties:
              ids:
                type: array
                items:
                  type: string
                  format: uuid
              is_active:
                type: boolean
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
/tenant/command-blacklist/search-schema:
  get:
    tags:
    - 高危指令黑名单
    summary: 获取黑名单搜索字段定义
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
/tenant/command-blacklist/simulate:
  post:
    tags:
    - 高危指令黑名单
    summary: 仿真测试黑名单匹配
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - pattern
            - match_type
            properties:
              pattern:
                type: string
              match_type:
                type: string
                x-dict-type: command_blacklist_match_type
                x-dict-mode: exact
              files:
                type: array
                items:
                  type: object
                  additionalProperties: true
              content:
                type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      total_lines:
                        type: integer
                      match_count:
                        type: integer
                      matched_files:
                        type: object
                        additionalProperties:
                          type: integer
