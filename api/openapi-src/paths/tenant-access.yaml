/tenant/users:
  get:
    tags:
    - 用户管理
    summary: 获取用户列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: user_status
        x-dict-mode: exact
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
  post:
    tags:
    - 用户管理
    summary: 创建用户
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - username
            - email
            - password
            properties:
              username:
                type: string
              email:
                type: string
                format: email
              password:
                type: string
              display_name:
                type: string
              role_ids:
                type: array
                description: '角色ID列表（UUID格式）

                  获取方式：先调用 GET /roles 获取角色列表

                  留空数组 [] 表示不分配角色

                  '
                items:
                  type: string
                  format: uuid
                example: []
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
/tenant/users/{id}:
  get:
    tags:
    - 用户管理
    summary: 获取用户详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
  put:
    tags:
    - 用户管理
    summary: 更新用户
    parameters:
    - $ref: '#/components/parameters/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
              display_name:
                type: string
              status:
                type: string
                x-dict-type: user_status
                x-dict-mode: exact
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
  delete:
    tags:
    - 用户管理
    summary: 删除用户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
