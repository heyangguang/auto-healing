/platform/users:
  get:
    tags:
    - 平台用户管理
    summary: 获取平台用户列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
  post:
    tags:
    - 平台用户管理
    summary: 创建平台用户
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
/platform/users/simple:
  get:
    tags:
    - 平台用户管理
    summary: 获取平台简要用户列表
    parameters:
    - name: name
      in: query
      schema:
        type: string
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: user_status
        x-dict-mode: exact
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                message:
                  type: string
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/UserSimple'
/platform/users/{id}:
  get:
    tags:
    - 平台用户管理
    summary: 获取平台用户详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
  put:
    tags:
    - 平台用户管理
    summary: 更新平台用户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
  delete:
    tags:
    - 平台用户管理
    summary: 删除平台用户
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
/platform/users/{id}/reset-password:
  post:
    tags:
    - 平台用户管理
    summary: 重置平台用户密码
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
