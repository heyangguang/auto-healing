              secrets_source_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 覆盖密钥源
              skip_notification:
                type: boolean
                description: 跳过通知（全局）
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionSchedule'
  delete:
    tags:
    - 定时调度
    summary: 删除定时任务调度
