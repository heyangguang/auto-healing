      schema:
        type: integer
        minimum: 0
    - name: max_nodes
      in: query
      description: 最多节点数
      schema:
        type: integer
        minimum: 0
    - name: min_failed_nodes
      in: query
      description: 最少失败节点数
      schema:
        type: integer
        minimum: 0
    - name: max_failed_nodes
      in: query
      description: 最多失败节点数
      schema:
        type: integer
        minimum: 0
    - name: sort_by
      in: query
