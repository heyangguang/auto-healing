/tenant/execution-tasks:
  get:
    tags:
    - 执行任务
    summary: 获取任务模板列表
    description: '获取任务模板列表，支持多条件筛选。

      - **search**: 模糊搜索任务名称或描述

      - **executor_type**: 筛选执行器类型

      - **status**: 筛选任务状态（pending_review = 需审核，ready = 就绪）

      - **playbook_id**: 筛选关联的 Playbook

      '
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: search
      in: query
      description: 模糊搜索（匹配任务名称或描述）
      schema:
        type: string
    - name: executor_type
      in: query
      description: 执行器类型筛选
      schema:
        type: string
        enum:
        - local
        - docker
    - name: status
      in: query
      description: 状态筛选（pending_review = 需审核，ready = 就绪）
      schema:
        type: string
        enum:
        - pending_review
        - ready
    - name: playbook_id
      in: query
      description: 关联的 Playbook ID
      schema:
        type: string
        format: uuid
    - name: target_hosts
      in: query
      description: 模糊搜索（匹配目标主机）
      schema:
        type: string
    - name: playbook_name
      in: query
      description: 模糊搜索（关联的 Playbook 名称）
      schema:
        type: string
    - name: repository_name
      in: query
      description: 模糊搜索（关联的仓库名称）
      schema:
        type: string
    - name: has_runs
      in: query
      description: 筛选有执行记录的任务 (true) 或无执行记录的任务 (false)
      schema:
        type: boolean
    - name: min_run_count
      in: query
      description: 最小执行次数，筛选 run_count >= N 的任务
      schema:
        type: integer
        minimum: 1
    - name: last_run_status
      in: query
      description: 按最后执行状态筛选
      schema:
        type: string
        enum:
        - pending
        - running
        - success
        - failed
        - cancelled
        - timeout
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/ExecutionTask'
                total:
                  type: integer
  post:
    tags:
    - 执行任务
    summary: 创建任务模板
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - playbook_id
            - target_hosts
            properties:
              name:
                type: string
                description: 任务名称
              playbook_id:
                type: string
                format: uuid
                description: Playbook ID（状态必须为 ready 或 outdated）
/tenant/execution-tasks/stats:
  get:
    tags:
    - 执行任务
    summary: 获取任务模板统计
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExecutionTaskStats'
/tenant/execution-tasks/search-schema:
  get:
    tags:
    - 执行任务
    summary: 获取任务模板搜索字段定义
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTask'
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchableField'
/tenant/execution-tasks/{id}:
  get:
    tags:
    - 执行任务
    summary: 获取任务模板详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTask'
  delete:
    tags:
    - 执行任务
    summary: 删除任务模板（级联删除执行记录和日志）
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '204':
        description: 删除成功
  put:
    tags:
    - 执行任务
    summary: 更新任务模板
    parameters:
    - $ref: '#/components/parameters/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - playbook_id
            - target_hosts
            properties:
              name:
                type: string
                description: 任务名称
              playbook_id:
                type: string
                format: uuid
                description: 关联的 Playbook ID
              target_hosts:
                type: string
                description: 目标主机
              extra_vars:
                type: object
                description: 变量值
              executor_type:
                type: string
                enum:
                - local
                - docker
                default: local
              description:
                type: string
                description: 任务描述
              secrets_source_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 关联的密钥源 ID 列表
              schedule_expr:
                type: string
                description: 定时表达式 (cron 格式)
              is_recurring:
                type: boolean
                default: false
              notification_config:
                $ref: '#/components/schemas/TaskNotificationConfig'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTask'
/tenant/execution-tasks/{id}/execute:
  post:
    tags:
    - 执行任务
    summary: 执行任务（创建执行记录并运行）
    description: '如果任务模板的 needs_review = true，将返回错误，必须先调用确认审核接口。

      '
    parameters:
    - $ref: '#/components/parameters/ID'
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              triggered_by:
                type: string
                description: 触发者
              secrets_source_id:
                type: string
                format: uuid
                description: 密钥源ID（可选，向后兼容）
              secrets_source_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 多密钥源ID（可选，优先使用，用于混合认证场景）
              extra_vars:
                type: object
                description: 运行时覆盖变量
              target_hosts:
                type: string
                description: 覆盖目标主机（逗号分隔）
              skip_notification:
                type: boolean
                description: 跳过本次通知（全局）
    responses:
      '200':
        description: 执行完成
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionRun'
      '400':
        description: 执行失败（如 needs_review = true）
/tenant/execution-tasks/{id}/confirm-review:
  post:
    tags:
    - 执行任务
    summary: 确认审核变量变更
    description: '当 Playbook 变量变更后，关联的任务模板会被标记为 needs_review = true。

      调用此接口确认审核完成，清除 needs_review 状态并更新变量快照。

      '
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 审核确认成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTask'
/tenant/execution-tasks/{id}/runs:
  get:
    tags:
    - 执行任务
    summary: 获取任务的执行历史
    parameters:
    - $ref: '#/components/parameters/ID'
