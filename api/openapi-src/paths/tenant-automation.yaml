      schema:
        type: string
    - name: started_to
      in: query
      description: 开始时间结束
      schema:
        type: string
    - name: completed_from
      in: query
      description: 完成时间起始
      schema:
        type: string
    - name: completed_to
      in: query
      description: 完成时间结束
      schema:
        type: string
    - name: min_nodes
      in: query
