                total:
                  type: integer
/tenant/execution-schedules:
  get:
    tags:
    - 定时调度
    summary: 获取定时任务调度列表
    description: '获取定时任务调度列表，支持多条件筛选。

      - **search**: 模糊搜索调度名称或描述

      - **task_id**: 按关联的任务模板筛选

      - **enabled**: 按启用状态筛选

      - **is_recurring**: 按是否循环执行筛选

      '
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: search
      in: query
      description: 模糊搜索（匹配调度名称或描述）
      schema:
        type: string
    - name: task_id
      in: query
      schema:
        type: string
        format: uuid
      description: 按任务模板筛选
    - name: enabled
      in: query
      schema:
        type: boolean
      description: 按启用状态筛选
    - name: is_recurring
      in: query
      schema:
        type: boolean
      description: 按是否循环执行筛选
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/ExecutionSchedule'
                total:
                  type: integer
  post:
    tags:
    - 定时调度
    summary: 创建定时任务调度
    description: '创建定时任务调度，支持配置执行参数覆盖（与手动执行保持一致）。

      覆盖参数为可选，不填则使用任务模板的默认配置。

      '
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - task_id
            - schedule_expr
            properties:
              name:
                type: string
                description: 调度名称
              task_id:
                type: string
                format: uuid
                description: 关联的任务模板 ID
              schedule_expr:
                type: string
                description: Cron 表达式
              is_recurring:
                type: boolean
                default: true
              description:
                type: string
              target_hosts_override:
                type: string
                description: 覆盖目标主机（逗号分隔）
              extra_vars_override:
                type: object
                description: 覆盖变量
              secrets_source_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 覆盖密钥源
              skip_notification:
                type: boolean
                description: 跳过通知（全局）
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionSchedule'
/tenant/execution-schedules/{id}:
  get:
    tags:
    - 定时调度
    summary: 获取定时任务调度详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionSchedule'
  put:
    tags:
