/tenant/plugins:
  get:
    tags:
    - 插件管理
    summary: 获取插件列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: type
      in: query
      schema:
        type: string
        x-dict-type: plugin_type
        x-dict-mode: exact
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: plugin_status
        x-dict-mode: exact
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plugin'
  post:
    tags:
    - 插件管理
    summary: 创建插件
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - type
            - config
            properties:
              name:
                type: string
                example: 生产环境 ITSM
              type:
                type: string
                x-dict-type: plugin_type
                x-dict-mode: exact
                example: itsm
              description:
                type: string
              version:
                type: string
                example: 1.0.0
              config:
                type: object
                description: 连接配置
                example:
                  url: https://itsm.example.com/api/incidents
              field_mapping:
                type: object
                description: 字段映射规则
                example:
                  incident_mapping:
                    external_id: ticket_id
                    title: subject
              sync_filter:
                type: object
                description: 同步过滤器配置（支持嵌套 AND/OR 逻辑）
                example:
                  logic: and
                  rules:
                  - field: priority
                    operator: in
                    value:
                    - '1'
                    - '2'
              sync_enabled:
                type: boolean
                example: true
              sync_interval_minutes:
                type: integer
                minimum: 1
                example: 5
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plugin'
/tenant/plugins/search-schema:
  get:
    tags:
    - 插件管理
    summary: 获取插件搜索字段定义
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchableField'
/tenant/plugins/stats:
  get:
    tags:
    - 插件管理
    summary: 获取插件统计
    description: 返回插件的总数、类型分布、状态分布、同步配置统计等信息
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PluginStats'
/tenant/plugins/{id}:
  get:
    tags:
    - 插件管理
    summary: 获取插件详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plugin'
  put:
    tags:
    - 插件管理
    summary: 更新插件
    description: '更新插件配置。只需传递需要修改的字段。

      **可更新字段：** description, version, config, field_mapping, sync_filter, sync_enabled, sync_interval_minutes

      **不可修改：** name, type

      '
    parameters:
    - $ref: '#/components/parameters/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              description:
                type: string
              version:
                type: string
              config:
                type: object
              field_mapping:
                type: object
              sync_filter:
                type: object
                description: 同步过滤器配置
              sync_enabled:
                type: boolean
              sync_interval_minutes:
                type: integer
          example:
            description: 更新后的描述
            version: 1.1.0
            sync_filter:
              logic: and
              rules:
              - field: priority
                operator: in
                value:
                - '1'
                - '2'
            sync_enabled: true
            sync_interval_minutes: 10
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plugin'
  delete:
    tags:
    - 插件管理
    summary: 删除插件
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        $ref: '#/components/responses/Success'
/tenant/plugins/{id}/test:
  post:
    tags:
    - 插件管理
    summary: 测试插件连接
    description: 只测试连接，不改变插件状态
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 连接测试成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 连接测试成功
      '400':
        description: 连接测试失败
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/tenant/plugins/{id}/activate:
  post:
    tags:
    - 插件管理
    summary: 激活插件
    description: 测试连接成功后激活插件。只有激活状态的插件才会参与定时同步。
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 激活成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 插件已激活
      '400':
        description: 激活失败（连接测试失败）
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/tenant/plugins/{id}/deactivate:
  post:
    tags:
    - 插件管理
    summary: 停用插件
    description: 直接停用插件，不需要测试。停用后插件不再参与定时同步。
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 停用成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 插件已停用
/tenant/plugins/{id}/sync:
  post:
    tags:
    - 插件管理
    summary: 触发手动同步
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 同步任务已创建
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginSyncLog'
/tenant/plugins/{id}/logs:
  get:
    tags:
    - 插件管理
    summary: 获取插件同步日志
    parameters:
    - $ref: '#/components/parameters/ID'
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PluginSyncLog'
/tenant/incidents/stats:
  get:
    tags:
    - 工单管理
    summary: 获取工单统计
    description: 返回工单的各状态统计数据
    responses:
      '200':
        description: 统计数据
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                  example: 0
                message:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    total:
                      type: integer
                      description: 总工单数
                      example: 100
                    scanned:
                      type: integer
                      description: 已扫描数
                      example: 80
                    unscanned:
                      type: integer
                      description: 待扫描数
                      example: 20
                    matched:
                      type: integer
                      description: 已匹配规则数
                      example: 50
                    pending:
                      type: integer
                      description: 待处理数
                      example: 30
                    processing:
                      type: integer
                      description: 自愈中数
                      example: 5
                    healed:
                      type: integer
                      description: 已自愈数
                      example: 40
                    failed:
                      type: integer
                      description: 自愈失败数
                      example: 5
                    skipped:
                      type: integer
                      description: 已跳过数
                      example: 10
                    dismissed:
                      type: integer
                      description: 已忽略数
                      example: 2
/tenant/incidents/search-schema:
  get:
    tags:
    - 工单管理
    summary: 获取工单搜索字段定义
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchableField'
/tenant/incidents:
  get:
    tags:
    - 工单管理
    summary: 获取工单列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: plugin_id
      in: query
      description: 插件ID（UUID格式）
      schema:
        type: string
        format: uuid
    - name: source_plugin_name
      in: query
      description: 来源插件名称（用于查询已删除插件的工单，支持模糊匹配）
      schema:
        type: string
      example: 已删除
    - name: search
      in: query
      description: 模糊搜索（标题、描述、外部 ID）
      schema:
        type: string
    - name: external_id
      in: query
      description: 外部工单 ID（支持模糊匹配）
      schema:
        type: string
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: incident_status
        x-dict-mode: exact
    - name: healing_status
      in: query
      description: 按自愈状态筛选
      schema:
        type: string
        x-dict-type: healing_status
        x-dict-mode: exact
    - name: severity
      in: query
      schema:
        type: string
        x-dict-type: incident_severity
        x-dict-mode: subset
    - name: has_plugin
      in: query
      description: 是否有关联插件 (true=有, false=无/已删除)
      schema:
        type: boolean
    - name: sort_by
      in: query
      description: 排序字段
      schema:
        type: string
        enum:
        - created_at
        - severity
    - name: sort_order
      in: query
      description: 排序方向
      schema:
        type: string
        enum:
        - asc
        - desc
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Incident'
/tenant/incidents/{id}:
  get:
    tags:
    - 工单管理
    summary: 获取工单详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Incident'
/tenant/incidents/{id}/close:
  post:
    tags:
    - 工单管理
    summary: 关闭工单
    parameters:
    - $ref: '#/components/parameters/ID'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CloseIncidentRequest'
    responses:
      '200':
        description: 关闭成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseIncidentResponse'
/tenant/incidents/{id}/trigger:
  post:
    tags:
    - 工单管理
    summary: 手动触发工单自愈
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlowInstance'
/tenant/incidents/{id}/dismiss:
  post:
    tags:
    - 工单管理
    summary: 忽略待触发工单
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 忽略成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 工单已忽略
/tenant/incidents/{id}/reset-scan:
  post:
    tags:
    - 工单管理
    summary: 重置工单扫描状态
    description: '将工单的 scanned 设为 false，清除 matched_rule_id 和 healing_flow_instance_id。

      这样工单会被自愈调度器重新扫描。

      '
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 重置成功
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 工单扫描状态已重置，将被重新扫描
/tenant/incidents/batch-reset-scan:
  post:
    tags:
    - 工单管理
    summary: 批量重置工单扫描状态
    description: '批量重置工单的扫描状态。可以通过指定 ID 列表或按自愈状态筛选。

      '
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              ids:
                type: array
                description: 指定工单 ID 列表（为空时按条件筛选）
                items:
                  type: string
                  format: uuid
              healing_status:
                type: string
                description: 按自愈状态筛选
                x-dict-type: healing_status
                x-dict-mode: exact
          examples:
            by_ids:
              summary: 重置指定工单
              value:
                ids:
                - uuid1
                - uuid2
            by_status:
              summary: 重置所有失败的工单
              value:
                healing_status: failed
    responses:
      '200':
        description: 重置成功
        content:
          application/json:
            schema:
              type: object
              properties:
                affected_count:
                  type: integer
                  example: 5
                message:
                  type: string
                  example: 成功重置 5 条工单的扫描状态
/tenant/cmdb:
  get:
    tags:
    - CMDB
    summary: 获取 CMDB 配置项列表
    parameters:
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    - name: type
      in: query
      description: 类型筛选
      schema:
        type: string
        x-dict-type: cmdb_type
        x-dict-mode: exact
    - name: status
      in: query
      description: 状态筛选
      schema:
        type: string
        x-dict-type: cmdb_status
        x-dict-mode: subset
    - name: environment
      in: query
      description: 环境筛选
      schema:
        type: string
        x-dict-type: cmdb_environment
        x-dict-mode: subset
    - name: source_plugin_name
      in: query
      description: 来源插件名称
      schema:
        type: string
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/PaginatedResponse'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CMDBItem'
/tenant/cmdb/batch-test-connection:
  post:
    tags:
    - CMDB
    summary: 批量测试 SSH 连接
    description: 批量测试多个 CMDB 配置项的 SSH 连接
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - cmdb_ids
            - secrets_source_id
            properties:
              cmdb_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: CMDB 配置项 ID 列表（最多 50 个）
                maxItems: 50
              secrets_source_id:
                type: string
                format: uuid
                description: 密钥源 ID
    responses:
      '200':
        description: 测试结果
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/Success'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      success:
                        type: integer
                      failed:
                        type: integer
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/ConnectionTestResult'
/tenant/cmdb/{id}/test-connection:
  post:
    tags:
    - CMDB
    summary: 测试单个 CMDB 配置项的 SSH 连接
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - secrets_source_id
            properties:
              secrets_source_id:
                type: string
                format: uuid
                description: 密钥源 ID
    responses:
      '200':
        description: 测试结果
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionTestResult'
/tenant/cmdb/{id}/maintenance:
  post:
    tags:
    - CMDB
    summary: 进入维护模式
    description: 将配置项设置为维护状态，到期后自动恢复
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - reason
            properties:
              reason:
                type: string
                description: 维护原因
                example: 系统升级
              end_at:
                type: string
                format: date-time
                description: 维护结束时间（RFC3339格式）
                example: '2026-01-08T18:00:00+08:00'
    responses:
      '200':
        description: 进入维护模式成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
/tenant/cmdb/{id}/resume:
  post:
    tags:
    - CMDB
    summary: 退出维护模式
    description: 手动恢复配置项为正常状态
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: 恢复成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
/tenant/cmdb/{id}/maintenance-logs:
  get:
    tags:
    - CMDB
    summary: 获取维护日志
    description: 获取配置项的维护历史记录
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - $ref: '#/components/parameters/Page'
    - $ref: '#/components/parameters/PageSize'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/CMDBMaintenanceLog'
                total:
                  type: integer
                page:
                  type: integer
                page_size:
                  type: integer
/tenant/cmdb/batch/maintenance:
  post:
    tags:
    - CMDB
    summary: 批量进入维护模式
    description: 批量将配置项设置为维护状态，最多支持 100 个
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - ids
            - reason
            properties:
              ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 配置项 ID 列表
              reason:
                type: string
                description: 维护原因
              end_at:
                type: string
                format: date-time
                description: 维护结束时间
    responses:
      '200':
        description: 批量操作结果
        content:
          application/json:
            schema:
              type: object
              properties:
                total:
                  type: integer
                success:
                  type: integer
                failed:
                  type: integer
/tenant/cmdb/batch/resume:
  post:
    tags:
    - CMDB
    summary: 批量退出维护模式
    description: 批量恢复配置项为正常状态，最多支持 100 个
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - ids
            properties:
              ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: 配置项 ID 列表
    responses:
      '200':
        description: 批量操作结果
        content:
          application/json:
            schema:
              type: object
              properties:
                total:
                  type: integer
                success:
                  type: integer
                failed:
                  type: integer
/tenant/cmdb/stats:
  get:
    tags:
    - CMDB
    summary: 获取 CMDB 统计信息
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CMDBStats'
/tenant/cmdb/{id}:
  get:
    tags:
    - CMDB
    summary: 获取 CMDB 配置项详情
    parameters:
    - $ref: '#/components/parameters/ID'
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CMDBItem'
/tenant/secrets-sources:
  get:
    tags:
    - 密钥管理
    summary: 获取密钥源列表
    parameters:
    - name: type
      in: query
      schema:
        type: string
        x-dict-type: secrets_source_type
        x-dict-mode: exact
    - name: status
      in: query
      schema:
        type: string
        x-dict-type: secrets_source_status
        x-dict-mode: exact
    - name: is_default
      in: query
      schema:
        type: boolean
      description: 筛选默认密钥源
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/SecretsSource'
