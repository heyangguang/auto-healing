CommandBlacklist:
  type: object
  properties:
    id:
      type: string
      format: uuid
    tenant_id:
      type: string
      format: uuid
      nullable: true
    name:
      type: string
    pattern:
      type: string
    match_type:
      type: string
      x-dict-type: command_blacklist_match_type
      x-dict-mode: exact
    severity:
      type: string
      x-dict-type: command_blacklist_severity
      x-dict-mode: exact
    category:
      type: string
      x-dict-type: command_blacklist_category
      x-dict-mode: exact
    description:
      type: string
    is_active:
      type: boolean
    is_system:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
