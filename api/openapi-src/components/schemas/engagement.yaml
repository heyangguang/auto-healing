NotificationChannel:
  type: object
  description: 通知渠道
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    type:
      type: string
      enum:
      - webhook
      - dingtalk
      - email
    description:
      type: string
    retry_config:
      type: object
      properties:
        max_retries:
          type: integer
        retry_intervals:
          type: array
          items:
            type: integer
    recipients:
      type: array
      items:
        type: string
    is_active:
      type: boolean
    is_default:
      type: boolean
    rate_limit_per_minute:
      type: integer
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
NotificationChannelCreate:
  type: object
  required:
  - name
  - type
  - config
  properties:
    name:
      type: string
    type:
      type: string
      enum:
      - webhook
      - dingtalk
      - email
    description:
      type: string
    config:
      type: object
    retry_config:
      type: object
    recipients:
      type: array
      items:
        type: string
    is_default:
      type: boolean
    rate_limit_per_minute:
      type: integer
      nullable: true
NotificationChannelUpdate:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    config:
      type: object
    retry_config:
      type: object
    recipients:
      type: array
      items:
        type: string
    is_active:
      type: boolean
    is_default:
      type: boolean
    rate_limit_per_minute:
      type: integer
      nullable: true
NotificationTemplate:
  type: object
  description: 通知模板 (支持 40 个变量)
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    description:
      type: string
    event_type:
      type: string
      enum:
      - incident_created
      - incident_resolved
      - approval_required
      - execution_result
      - custom
    supported_channels:
      type: array
      items:
        type: string
        enum:
        - email
        - dingtalk
        - webhook
    subject_template:
      type: string
    body_template:
      type: string
    format:
      type: string
      enum:
      - text
      - markdown
      - html
    available_variables:
      type: array
      items:
        type: string
      description: 模板使用的 40 个变量列表
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    is_active:
      type: boolean
NotificationTemplateCreate:
  type: object
  required:
  - name
  - body_template
  properties:
    name:
      type: string
    description:
      type: string
    event_type:
      type: string
      enum:
      - incident_created
      - incident_resolved
      - approval_required
      - execution_result
      - custom
    supported_channels:
      type: array
      items:
        type: string
        enum:
        - email
        - dingtalk
        - webhook
    subject_template:
      type: string
    body_template:
      type: string
      description: '支持 40 个变量:

        - 时间: timestamp, date, time

        - 执行: execution.run_id, status, exit_code, duration, stdout, stderr

        - 任务: task.id, name, target_hosts, host_count, executor_type

        - 仓库: repository.id, name, url, main_playbook, branch

        - 统计: stats.ok, changed, failed, unreachable, skipped, total, success_rate

        - 系统: system.name, version, env

        - 错误: error.message, error.host

        '
    format:
      type: string
      enum:
      - text
      - markdown
      - html
    is_active:
      type: boolean
NotificationTemplateUpdate:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    event_type:
      type: string
      enum:
      - incident_created
      - incident_resolved
      - approval_required
      - execution_result
      - custom
    supported_channels:
      type: array
      items:
        type: string
        enum:
        - email
        - dingtalk
        - webhook
    subject_template:
      type: string
    body_template:
      type: string
    format:
      type: string
      enum:
      - text
      - markdown
      - html
    is_active:
      type: boolean
TemplateVariable:
  type: object
  description: 模板可用变量
  properties:
    name:
      type: string
      example: execution.stdout
    category:
      type: string
      enum:
      - timestamp
      - execution
      - task
      - repository
      - stats
      - system
      - error
    description:
      type: string
      example: Ansible 标准输出 (最大 100000 字符)
Notification:
  type: object
  description: 通知发送记录
  properties:
    id:
      type: string
      format: uuid
    execution_run_id:
      type: string
      format: uuid
    template_id:
      type: string
      format: uuid
    channel_id:
      type: string
      format: uuid
    status:
      type: string
      enum:
      - pending
      - sent
      - delivered
      - failed
      - bounced
    subject:
      type: string
    body:
      type: string
    recipients:
      type: array
      items:
        type: string
    retry_count:
      type: integer
    error_message:
      type: string
      nullable: true
    response_data:
      type: object
    next_retry_at:
      type: string
      format: date-time
      nullable: true
    sent_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
NotificationStats:
  type: object
  properties:
    channels_total:
      type: integer
    channels_by_type:
      type: array
      items:
        $ref: '#/components/schemas/NotificationTypeCount'
    templates_total:
      type: integer
    templates_active:
      type: integer
    logs_total:
      type: integer
    logs_by_status:
      type: array
      items:
        $ref: '#/components/schemas/NotificationStatusCount'
NotificationTypeCount:
  type: object
  properties:
    type:
      type: string
      enum:
      - webhook
      - dingtalk
      - email
    count:
      type: integer
NotificationStatusCount:
  type: object
  properties:
    status:
      type: string
      enum:
      - pending
      - sent
      - delivered
      - failed
      - bounced
    count:
      type: integer
SiteMessage:
  type: object
  properties:
    id:
      type: string
      format: uuid
    tenant_id:
      type: string
      format: uuid
      nullable: true
    target_tenant_id:
      type: string
      format: uuid
      nullable: true
    category:
      type: string
      enum:
      - system_update
      - fault_alert
      - service_notice
      - product_news
      - activity
      - security
      - announcement
    title:
      type: string
    content:
      type: string
    created_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
      nullable: true
SiteMessageWithReadStatus:
  allOf:
  - $ref: '#/components/schemas/SiteMessage'
  - type: object
    properties:
      is_read:
        type: boolean
