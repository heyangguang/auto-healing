UserInfo:
  type: object
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
    display_name:
      type: string
    roles:
      type: array
      items:
        type: string
    permissions:
      type: array
      items:
        type: string
RoleDetail:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    display_name:
      type: string
    is_system:
      type: boolean
    scope:
      type: string
      x-dict-type: role_scope
      x-dict-mode: exact
UserProfile:
  type: object
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
    display_name:
      type: string
    phone:
      type: string
    avatar_url:
      type: string
    status:
      type: string
      x-dict-type: user_status
      x-dict-mode: exact
    last_login_at:
      type: string
      format: date-time
      nullable: true
    last_login_ip:
      type: string
    password_changed_at:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time
    roles:
      type: array
      items:
        $ref: '#/components/schemas/RoleDetail'
    permissions:
      type: array
      items:
        type: string
    is_platform_admin:
      type: boolean
LoginPayload:
  type: object
  properties:
    access_token:
      type: string
    refresh_token:
      type: string
    token_type:
      type: string
      example: Bearer
    expires_in:
      type: integer
      example: 3600
    user:
      $ref: '#/components/schemas/UserInfo'
    tenants:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          code:
            type: string
    current_tenant_id:
      type: string
User:
  type: object
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
    display_name:
      type: string
    status:
      type: string
      x-dict-type: user_status
      x-dict-mode: exact
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
UserSimple:
  type: object
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
    display_name:
      type: string
    status:
      type: string
      x-dict-type: user_status
      x-dict-mode: exact
Role:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    display_name:
      type: string
    description:
      type: string
    is_system:
      type: boolean
    scope:
      type: string
      x-dict-type: role_scope
      x-dict-mode: exact
    created_at:
      type: string
      format: date-time
Permission:
  type: object
  properties:
    id:
      type: string
      format: uuid
    code:
      type: string
    name:
      type: string
    module:
      type: string
      x-dict-type: permission_module
      x-dict-mode: exact
    resource:
      type: string
    action:
      type: string
