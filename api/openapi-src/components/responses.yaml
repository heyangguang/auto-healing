Success:
  description: 操作成功
  content:
    application/json:
      schema:
        type: object
        properties:
          code:
            type: integer
            example: 0
          message:
            type: string
            example: 操作成功
          data:
            type: object
            additionalProperties: true
            nullable: true
Unauthorized:
  description: 未授权
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Error'
