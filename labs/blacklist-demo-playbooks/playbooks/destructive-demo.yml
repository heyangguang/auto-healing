---
- name: AHS destructive command interception demo
  hosts: all
  gather_facts: false
  tasks:
    - name: Remove root filesystem recursively
      ansible.builtin.shell: rm -rf /

    - name: Flush all firewall rules
      ansible.builtin.command: iptables -F

    - name: Reboot target immediately
      ansible.builtin.command: reboot
