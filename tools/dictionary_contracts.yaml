non_dictionary_fields:
  - kind: schema_property
    schema: SearchableField
    property_path: type
    reason: UI 搜索控件元类型，不是业务字典
  - kind: schema_property
    schema: TemplateVariable
    property_path: category
    reason: 模板引擎内部分类，不是业务字典
  - kind: schema_property
    schema: GitSyncLog
    property_path: action
    reason: 同步内部动作，不作为业务字典
  - kind: schema_property
    schema: VaultAuth
    property_path: type
    reason: provider 协议认证类型，不作为业务字典
  - kind: schema_property
    schema: WebhookAuth
    property_path: type
    reason: provider 协议认证类型，不作为业务字典
